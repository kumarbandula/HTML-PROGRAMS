<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>
<body>

<h2>Student Information Table</h2>

<table border="1">
    <tr>
        <th rowspan="2">Roll No</th>
        <th rowspan="2">Name</th>
        <th colspan="2">Marks</th>
    </tr>
    <tr>
        <th>Maths</th>
        <th>Science</th>
    </tr>
    <tr>
        <td>101</td>
        <td>Rahul</td>
        <td>85</td>
        <td>90</td>
    </tr>
    <tr>
        <td>102</td>
        <td>Anita</td>
        <td>88</td>
        <td>92</td>
    </tr>
</table>

</body>
</html>
