<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>

<body>

<center>
    <h2>STUDENT REGISTRATION FORM</h2>
</center>

<form action="#" method="post">

<table border="2" cellpadding="8" cellspacing="5" align="center" width="60%">

    <tr>
        <td>Full Name</td>
        <td><input type="text" name="fullname" required></td>
    </tr>

    <tr>
        <td>Password</td>
        <td><input type="password" name="password" required></td>
    </tr>

    <tr>
        <td>Mobile Number</td>
        <td><input type="number" name="mobile"></td>
    </tr>

    <tr>
        <td>Date of Birth</td>
        <td><input type="date" name="dob"></td>
    </tr>

    <tr>
        <td>Gender</td>
        <td>
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Other"> Other
        </td>
    </tr>

    <tr>
        <td>Languages Known</td>
        <td>
            <input type="checkbox" name="lang" value="English"> English
            <input type="checkbox" name="lang" value="Telugu"> Telugu
            <input type="checkbox" name="lang" value="Hindi"> Hindi
        </td>
    </tr>

    <tr>
        <td>Course</td>
        <td>
            <select name="course">
                <option value="">--Select Course--</option>
                <option value="CSE">B.Tech - CSE</option>
                <option value="ECE">B.Tech - ECE</option>
                <option value="EEE">B.Tech - EEE</option>
                <option value="MECH">B.Tech - MECH</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>Address</td>
        <td>
            <textarea name="address" rows="4" cols="30"></textarea>
        </td>
    </tr>

    <tr align="center">
        <td colspan="2">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </td>
    </tr>

</table>

</form>

</body>
</html>
